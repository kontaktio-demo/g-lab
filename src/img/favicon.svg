<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Black rounded square background (matches site theme) -->
  <rect width="64" height="64" rx="12" fill="#000000"/>
  <!-- Subtle red inner border to hint the brand accent -->
  <rect x="2" y="2" width="60" height="60" rx="10"
        fill="none" stroke="#ff001e" stroke-width="1" opacity="0.35"/>
  <!-- G-LAB wordmark, properly scaled to fill the icon -->
  <g font-family="Inter, Arial, sans-serif" font-weight="900"
     letter-spacing="-1.5" fill="#ff001e">
    <text x="32" y="40" text-anchor="middle" font-size="22">G-LAB</text>
  </g>
</svg>
