[build]
  command = "npm run build"
  publish = "public"

[build.environment]
  NODE_VERSION = "20"

# Pretty URLs / 301s
[[redirects]]
  from = "/katalog"
  to = "/katalog/"
  status = 301

[[redirects]]
  from = "/realizacje"
  to = "/realizacje/"
  status = 301

# Security & cache headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
