[build]
  command = "npm run build"
  publish = "public"

[build.environment]
  NODE_VERSION = "20"

# Strip .html extension from URLs (Pretty URLs)
[build.processing]
  skip_processing = false
[build.processing.html]
  pretty_urls = true

# Pretty URLs / 301s — wszystkie podstrony używają trailing slash
[[redirects]]
  from = "/katalog"
  to = "/katalog/"
  status = 301

[[redirects]]
  from = "/realizacje"
  to = "/realizacje/"
  status = 301

[[redirects]]
  from = "/chiptuning"
  to = "/chiptuning/"
  status = 301

[[redirects]]
  from = "/dpf-egr"
  to = "/dpf-egr/"
  status = 301

[[redirects]]
  from = "/hamownia"
  to = "/hamownia/"
  status = 301

[[redirects]]
  from = "/kontakt"
  to = "/kontakt/"
  status = 301

[[redirects]]
  from = "/polityka-prywatnosci"
  to = "/polityka-prywatnosci/"
  status = 301

[[redirects]]
  from = "/regulamin"
  to = "/regulamin/"
  status = 301

# Security & cache headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
